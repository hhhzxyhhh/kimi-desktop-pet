<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Kimi 桌宠</title>
<style>
  html, body {
    margin: 0; padding: 0; width: 240px; height: 240px;
    overflow: hidden; background: transparent;
    font-family: system-ui, -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    -webkit-user-select: none; user-select: none;
  }
  .shadow {
    position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
    width: 110px; height: 14px; border-radius: 50%;
    background: radial-gradient(ellipse, rgba(30,80,180,.25), transparent 70%);
    pointer-events: none;
  }
  .orb {
    position: absolute; left: 50%; bottom: 16px;
    width: 150px; height: 150px; margin-left: -75px;
    cursor: pointer;
  }
  .orb svg { width: 100%; height: 100%; display: block; overflow: visible; filter: drop-shadow(0 6px 14px rgba(41,132,252,.30)); }
  .squash { width: 100%; height: 100%; transform-origin: 50% 100%; transition: transform .25s ease; }
  .breathe { animation: breathe 3.4s ease-in-out infinite; }
  @keyframes breathe { 0%, 100% { transform: scale(1,1); } 50% { transform: scale(1.015,1.035); } }

  .eyes-wrap { transform-box: fill-box; transform-origin: center; transition: transform .09s ease; }
  .orb.blink .eyes-wrap { transform: scaleY(.08); }
  .eye-track { transition: transform .15s ease-out; }

  .orb .expr, .orb .sweat, .orb .bang, .orb .acc { display: none; }
  .orb[data-expr="default"] .expr-default,
  .orb[data-expr="happy"]   .expr-happy,
  .orb[data-expr="shock"]   .expr-shock,
  .orb[data-expr="angry"]   .expr-angry,
  .orb[data-expr="sleepy"]  .expr-sleepy,
  .orb[data-expr="love"]    .expr-love,
  .orb[data-expr="dizzy"]   .expr-dizzy,
  .orb[data-expr="think"]   .expr-think,
  .orb[data-expr="focus"]   .expr-focus,
  .orb[data-expr="search"]  .expr-default,
  .orb[data-expr="search"]  .acc-search,
  .orb[data-expr="think"]   .acc-gear,
  .orb[data-expr="focus"]   .acc-keyboard,
  .orb[data-expr="sweat"]   .expr-default { display: block; }
  .orb[data-expr="sweat"] .sweat { display: block; }
  .orb[data-expr="notice"] .expr-ask,
  .orb[data-expr="notice"] .bang { display: block; }
  .orb[data-expr="question"] .expr-ask,
  .orb[data-expr="question"] .acc-qmark { display: block; }
  .acc-gear { transform-box: fill-box; transform-origin: center; animation: gearSpin 1.4s linear infinite; }
  @keyframes gearSpin { to { transform: rotate(360deg); } }
  .acc-keyboard circle { opacity: .18; animation: keyTap .72s ease-in-out infinite; }
  .acc-keyboard circle:nth-child(3) { animation-delay: .12s; }
  .acc-keyboard circle:nth-child(4) { animation-delay: .24s; }
  .acc-keyboard circle:nth-child(5) { animation-delay: .36s; }
  .acc-keyboard circle:nth-child(6) { animation-delay: .48s; }
  .acc-keyboard circle:nth-child(7) { animation-delay: .6s; }
  @keyframes keyTap { 0%, 100% { opacity: .18; } 50% { opacity: 1; } }

  .hop { animation: hop .42s ease-in-out infinite; }
  @keyframes hop {
    0%   { transform: translateY(0)     scale(1.06,.9); }
    30%  { transform: translateY(-20px) scale(.95,1.1); }
    55%  { transform: translateY(-28px) scale(1,1); }
    100% { transform: translateY(0)     scale(1.06,.9); }
  }

  .poked { animation: poke .5s ease; }
  @keyframes poke { 0%{transform:scale(1,1);} 30%{transform:scale(1.22,.74);} 60%{transform:scale(.92,1.1);} 100%{transform:scale(1,1);} }
  .wobble { animation: wobble .7s ease; }
  @keyframes wobble { 0%{transform:scale(1.2,.8);} 25%{transform:scale(.9,1.12);} 50%{transform:scale(1.07,.94);} 75%{transform:scale(.98,1.03);} 100%{transform:scale(1,1);} }

  .orb.sleeping .breathe { animation: none; }
  .orb.sleeping .squash { transform: scale(1.14,.76); }

  .zzz { position: absolute; top: -8px; right: -2px; width: 40px; height: 60px; display: none; pointer-events: none; }
  /* 睡觉时球压扁，头顶下移 ~30px，zzz 跟着下去贴着 */
  .orb.sleeping .zzz { display: block; top: 18px; right: 4px; }
  .zzz span { position: absolute; font-weight: 800; color: #7ba7e8; opacity: 0; animation: rise 2.2s linear infinite; }
  .zzz span:nth-child(1) { font-size: 14px; right: 0; top: 26px; }
  .zzz span:nth-child(2) { font-size: 18px; right: 12px; top: 14px; animation-delay: .7s; }
  .zzz span:nth-child(3) { font-size: 22px; right: 24px; top: 0; animation-delay: 1.4s; }
  @keyframes rise {
    0% { opacity: 0; transform: translate(0, 8px) scale(.6); }
    20% { opacity: 1; }
    100% { opacity: 0; transform: translate(8px, -14px) scale(1.15); }
  }

  .bubble {
    position: absolute; bottom: 172px; left: 50%; transform: translateX(-50%) scale(0);
    transform-origin: 50% 100%;
    transition: transform .18s cubic-bezier(.34,1.56,.64,1); pointer-events: none;
  }
  .bubble.show { transform: translateX(-50%) scale(1); }
  /* 常驻气泡可点击关闭 */
  .bubble.clickable { pointer-events: auto; cursor: pointer; }
  /* 气泡主体反向补偿窗口 zoom，任何尺寸下保持固定视觉大小 */
  /* 气泡主体：反向补偿窗口 zoom，保持固定视觉大小；装不下时收敛，绝不截断 */
  .bubble-body {
    position: relative; background: #22304a; color: #fff; padding: 7px 13px;
    border-radius: 13px; font-size: 13px; white-space: nowrap; transform-origin: 50% 100%;
  }
  .bubble-body::after {
    content: ""; position: absolute; bottom: -6px; left: 50%; margin-left: -6px;
    border: 6px solid transparent; border-top-color: #22304a; border-bottom: 0;
  }

  /* 多会话指示点：球脚下一排（Dock 式"运行中"指示），每个开着的会话窗口一颗 */
  /* 绿=在干活，灰=空闲，红=出错/等你批准或回答 */
  .ses-dots {
    position: absolute; bottom: 2px; left: 50%;
    transform: translateX(-50%); transform-origin: 50% 100%;
    display: flex; gap: 6px; pointer-events: none;
  }
  .ses-dot { width: 8px; height: 8px; border-radius: 50%; background: #4cd97b; box-shadow: 0 0 4px rgba(76,217,123,.8); }
  .ses-dot.gray { background: #9aa5b1; box-shadow: none; opacity: .7; }
  .ses-dot.red { background: #ff5252; box-shadow: 0 0 4px rgba(255,82,82,.8); }

  .orb.talking .squash { animation: talkBob .5s ease-in-out infinite; }
  @keyframes talkBob { 0%, 100% { transform: translateY(0) scale(1,1); } 50% { transform: translateY(-6px) scale(.98,1.03); } }
</style>
</head>
<body>
  <div class="shadow"></div>
  <div class="orb" id="orb" data-expr="default">
    <div class="squash breathe" id="squash"></div>
    <div class="zzz" id="zzz"><span>z</span><span>Z</span><span>z</span></div>
  </div>
  <div class="bubble" id="bubble"><div class="bubble-body" id="bubbleBody"></div></div>
  <div class="ses-dots" id="sesDots"></div>
<script>
/* ---------- 浏览器兜底：直接双击 index.html 也能预览（只是不会满屏走） ---------- */
if (!window.petAPI) {
  window.petAPI = {
    step: () => {}, onStepDone: () => {}, dragStart: () => {}, dragTo: () => {}, resize: () => {},
    openTerminal: () => {},
    onScale: () => {}, onCursor: () => {}, onMode: () => {}, onAgentState: () => {},
    onToggleSleep: () => {}, onTalk: () => {}, onToast: () => {}, onSuperRemind: () => {}
  };
}

/* ---------- Kimi 本体（矢量，中心深外围浅，无嘴） ---------- */
function orbSvg() {
  return `
<svg viewBox="0 0 200 200" aria-hidden="true">
  <defs>
    <radialGradient id="g1" gradientUnits="userSpaceOnUse" cx="100" cy="110" r="92">
      <stop offset="0" stop-color="#1983FC"/>
      <stop offset=".35" stop-color="#2F8DFD"/>
      <stop offset=".7" stop-color="#55A3FF"/>
      <stop offset="1" stop-color="#78B6FF"/>
    </radialGradient>
  </defs>
  <ellipse cx="100" cy="112" rx="86" ry="79" fill="url(#g1)"/>
  <g class="eye-track">
  <g class="eyes-wrap">
    <g class="expr expr-default">
      <rect x="67" y="67" width="20" height="40" rx="10" fill="#ffffff"/>
      <rect x="113" y="67" width="20" height="40" rx="10" fill="#ffffff"/>
    </g>
    <g class="expr expr-happy">
      <path d="M64 92 Q77 76 90 92" stroke="#ffffff" stroke-width="9" fill="none" stroke-linecap="round"/>
      <path d="M110 92 Q123 76 136 92" stroke="#ffffff" stroke-width="9" fill="none" stroke-linecap="round"/>
    </g>
    <g class="expr expr-shock">
      <circle cx="77" cy="88" r="14" fill="#ffffff"/>
      <circle cx="123" cy="88" r="14" fill="#ffffff"/>
    </g>
    <g class="expr expr-angry">
      <path d="M64 76 L88 86 L64 98" stroke="#ffffff" stroke-width="9" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M136 76 L112 86 L136 98" stroke="#ffffff" stroke-width="9" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <g class="expr expr-sleepy">
      <path d="M64 90 Q77 100 90 90" stroke="#ffffff" stroke-width="8" fill="none" stroke-linecap="round"/>
      <path d="M110 90 Q123 100 136 90" stroke="#ffffff" stroke-width="8" fill="none" stroke-linecap="round"/>
    </g>
    <g class="expr expr-love">
      <path d="M77 103 C58 88 62 68 77 76 C92 68 96 88 77 103 Z" fill="#ffffff"/>
      <path d="M123 103 C104 88 108 68 123 76 C138 68 142 88 123 103 Z" fill="#ffffff"/>
    </g>
    <g class="expr expr-dizzy">
      <path d="M66 76 L88 98 M88 76 L66 98" stroke="#ffffff" stroke-width="8" stroke-linecap="round"/>
      <path d="M112 76 L134 98 M134 76 L112 98" stroke="#ffffff" stroke-width="8" stroke-linecap="round"/>
    </g>
    <g class="expr expr-think">
      <rect x="67" y="76" width="20" height="26" rx="10" fill="#ffffff"/>
      <rect x="113" y="76" width="20" height="26" rx="10" fill="#ffffff"/>
    </g>
    <g class="expr expr-ask">
      <rect x="67" y="76" width="20" height="26" rx="10" fill="#ffffff"/>
      <rect x="113" y="72" width="20" height="30" rx="10" fill="#ffffff"/>
      <path d="M60 71 Q73 62 87 69" stroke="#ffffff" stroke-width="6.5" fill="none" stroke-linecap="round"/>
    </g>
    <g class="expr expr-focus">
      <rect x="66" y="80" width="22" height="13" rx="6.5" fill="#ffffff" transform="rotate(14 77 86)"/>
      <rect x="112" y="80" width="22" height="13" rx="6.5" fill="#ffffff" transform="rotate(-14 123 86)"/>
    </g>
  </g>
  </g>
  <g class="acc acc-search">
    <circle cx="150" cy="54" r="18" fill="none" stroke="#cfe4ff" stroke-width="7"/>
    <path d="M162 66 L174 78" stroke="#cfe4ff" stroke-width="7" stroke-linecap="round"/>
  </g>
  <g class="acc acc-gear" stroke="#cfe4ff" fill="none">
    <circle cx="152" cy="58" r="24" stroke-width="14" stroke-dasharray="10.6 8.2"/>
    <circle cx="152" cy="58" r="7" fill="#cfe4ff" stroke="none"/>
  </g>
  <g class="acc acc-keyboard">
    <rect x="25" y="144" width="150" height="34" rx="8" fill="#cfe4ff"/>
    <circle cx="48" cy="156" r="3" fill="#1983FC"/>
    <circle cx="66" cy="156" r="3" fill="#1983FC"/>
    <circle cx="84" cy="156" r="3" fill="#1983FC"/>
    <circle cx="102" cy="156" r="3" fill="#1983FC"/>
    <circle cx="120" cy="156" r="3" fill="#1983FC"/>
    <circle cx="138" cy="156" r="3" fill="#1983FC"/>
    <rect x="60" y="166" width="80" height="6" rx="3" fill="#1983FC" opacity=".35"/>
  </g>
  <g class="acc acc-qmark" stroke="#ff5252" stroke-width="15" fill="none" stroke-linecap="round">
    <path d="M128 40 a24 24 0 1 1 36 27 c-8 7 -14 11 -14 21"/>
    <circle cx="150" cy="116" r="9" fill="#ff5252" stroke="none"/>
  </g>
  <path class="bang" d="M150 22 h22 a8 8 0 0 1 8 8 v58 a8 8 0 0 1 -8 8 h-22 a8 8 0 0 1 -8 -8 v-58 a8 8 0 0 1 8 -8 Z M161 116 m-13 0 a13 13 0 1 0 26 0 a13 13 0 1 0 -26 0" fill="#ff5252"/>
  <path class="sweat" d="M152 52 C162 68 164 76 152 84 C140 76 142 68 152 52 Z" fill="#9fdcff"/>
</svg>`;
}

const orb = document.getElementById('orb');
const squash = document.getElementById('squash');
const bubble = document.getElementById('bubble');
const bubbleBody = document.getElementById('bubbleBody');
const sesDots = document.getElementById('sesDots');
squash.innerHTML = orbSvg();

function setExpr(e) { orb.dataset.expr = e; }

/* ---------- 气泡（反向补偿窗口 zoom；装不下时收敛，但字号尽量不低于 12px） ---------- */
let bubbleTimer = null;
let curScale = 1;
function fitBubble() {
  const w = bubbleBody.offsetWidth, h = bubbleBody.offsetHeight;
  if (!w || !h) return;
  // 窗口 CSS 宽恒为 240，气泡底边锚在头顶上方（距顶 68px）：cMax 保证不截断
  const cMax = Math.min(236 / w, 68 / h);
  // 视觉字号下限 12px（13*0.923）：塞得下就守住下限，物理上塞不下仍按 cMax 收敛
  const t = Math.min(1 / curScale, cMax);
  const t12 = (12 / 13) / curScale;
  bubbleBody.style.transform = `scale(${Math.min(Math.max(t, t12), cMax)})`;
}
// 指示点：随球缩放，但不小于固定尺寸（球小时按 1/curScale 补偿，球大时跟球一起大）
petAPI.onScale(s => {
  curScale = s;
  fitBubble();
  sesDots.style.transform = `translateX(-50%) scale(${Math.max(1, 1 / s)})`;
});

function say(text, ms) {
  if (bubble.classList.contains('clickable')) return; // 常驻气泡没被点掉前，普通气泡不顶它
  bubbleBody.textContent = text;
  fitBubble();
  clearTimeout(bubbleTimer);
  bubble.classList.remove('clickable');
  bubble.classList.add('show');
  bubbleTimer = setTimeout(() => bubble.classList.remove('show'), ms || 1600);
}

// 常驻气泡：不自动消失，点一下才关（重要提示用，比如"要输密码哦"）
function saySticky(text) {
  bubbleBody.textContent = text;
  fitBubble();
  clearTimeout(bubbleTimer);
  bubble.classList.add('show', 'clickable');
}
// 点常驻气泡关闭
bubble.addEventListener('click', () => bubble.classList.remove('show', 'clickable'));

/* ---------- 状态机：idle / walk / sleep / drag ---------- */
let state = 'idle';
/* ---------- 行为模式：stay 乖乖待着（不散步）/ kolo 到处乱跑 ---------- */
let mode = 'kolo';
petAPI.onMode(m => {
  mode = m;
  if (m === 'stay' && state === 'walk') toIdle(); // 正在走路也原地停下
});

/* ---------- Kimi Code 联动：agent 状态覆盖表情（drag/sleep 时不打扰） ---------- */
let agentState = null, agentFaceSince = 0, agentQueueTimer = null;
let agentSessions = []; // 主进程下发的活跃会话清单 [{id, proj, state}]
let lastDotSig = '';    // 指示点 DOM 的清单签名，没变不重绘
const agentExprMap = { thinking: 'think', working: 'focus', searching: 'search', permission: 'notice', ask: 'question', done: 'happy', error: 'dizzy' };
petAPI.onAgentState((p) => {
  updateSessions(p.sessions || []); // 徽标与完成播报即时更新，不受思考脸排队影响
  const next = p.state === 'idle' ? null : p.state;
  const now = Date.now();
  // 思考脸至少挂 1.2s：思考→调工具常常不足一秒，不兜底就一闪而过
  if (agentState === 'thinking' && next !== 'thinking' && now - agentFaceSince < 1200) {
    clearTimeout(agentQueueTimer);
    agentQueueTimer = setTimeout(() => applyAgentState(next), 1200 - (now - agentFaceSince));
    return;
  }
  applyAgentState(next);
});
// 会话清单：新进入 done 的会话点名播报（哪个好了）；脚下指示点数量=开着的窗口数
// 估算一段文本按 fitBubble 规则渲染后的视觉字号（13px 基准、单行）
function fitFontPx(text) {
  const w = text.length * 13 + 26;
  const cMax = Math.min(236 / w, 68 / 31);
  return 13 * Math.min(1 / curScale, cMax) * curScale;
}
function updateSessions(list) {
  const prevDone = new Set(agentSessions.filter(x => x.state === 'done').map(x => x.id));
  for (const x of list) {
    if (x.state === 'done' && !prevDone.has(x.id)) {
      // 项目名太长会把字号压过 12px 下限：达不到就降级为「搞定！」，全名去"会话状态"菜单看
      const proj = x.proj || '那边';
      const short = proj.length > 10 ? proj.slice(0, 9) + '…' : proj;
      const full = `「${short}」搞定！`;
      say(fitFontPx(full) >= 12 ? full : '搞定！', 3000);
    }
  }
  agentSessions = list;
  // 清单没变就不动 DOM（每 500ms 都会来一帧）；红=要处理，灰=空闲，绿=在干活
  const sig = list.map(x => x.id + ':' + x.state).join();
  if (sig !== lastDotSig) {
    lastDotSig = sig;
    const dotClass = (s) => ['permission', 'ask', 'error'].includes(s) ? ' red' : (s === 'idle' ? ' gray' : '');
    sesDots.innerHTML = list.map(x => `<span class="ses-dot${dotClass(x.state)}"></span>`).join('');
  }
}
function applyAgentState(next) {
  const was = agentState;
  agentState = next;
  if (next && next !== was) agentFaceSince = Date.now();
  if (agentState && state === 'sleep') wake(false);      // 来活了叫醒
  else if (agentState && orb.classList.contains('sleeping')) orb.classList.remove('sleeping'); // 状态/类名兜底同步
  else if (agentState && state === 'walk') toIdle();     // 开工期间原地上班，不乱跑
  refreshFace();
}
function refreshFace() {
  // 拖拽/睡觉（含类名残留）优先，agent 表情绝不允许盖上去
  if (state === 'drag' || state === 'sleep' || orb.classList.contains('sleeping')) return;
  if (agentState) setExpr(agentExprMap[agentState] || 'default');
  else setExpr('default');
}
let vx = 0, vy = 0; // 游走速度向量（像素/蹦跳周期）
let walkTX = 0, walkTY = 0; // 本次散步的目的地（屏幕坐标）
let winCX = 0, winCY = 0, winArea = null; // 窗口中心与屏幕工作区（主进程光标轮询顺带发回）
let stateTimer = null, stepTimer = null, walkStopTimer = null, sleepTimer = null;

function clearTimers() {
  clearTimeout(stateTimer); clearInterval(stepTimer);
  clearTimeout(walkStopTimer); clearTimeout(sleepTimer);
  stateTimer = stepTimer = walkStopTimer = sleepTimer = null;
}

function toIdle() {
  clearTimers();
  state = 'idle';
  orb.classList.remove('sleeping');
  squash.classList.remove('hop');
  squash.classList.add('breathe');
  stateTimer = setTimeout(decide, 4000 + Math.random() * 5000);
}

function decide() {
  if (state !== 'idle' || reminding) return; // 提醒期间不散步不摸鱼
  if (agentState) { stateTimer = setTimeout(decide, 3000); return; } // 开工期间坚守岗位，不散步不摸鱼
  const r = Math.random();
  if (mode === 'kolo' && r < .55) startWalk();          // stay 模式不散步
  else if (r < (mode === 'kolo' ? .65 : .2)) startSleep(); // kolo 睡 10%，stay 睡 20%
  else stateTimer = setTimeout(decide, 3000 + Math.random() * 4000);
}

function startWalk() {
  clearTimers();
  state = 'walk';
  orb.classList.remove('sleeping'); // 走路与睡颜互斥：即使被绕过正常流程直接调用，也不许一边睡一边蹦
  squash.classList.remove('breathe');
  squash.classList.add('hop');
  // 满屏乱跑：全屏随机选个目的地，直线蹦过去；到达或超时收工
  const size = 240 * curScale;
  const a = winArea || { x: 0, y: 38, width: 1512, height: 876 };
  walkTX = a.x + Math.random() * (a.width - size);
  walkTY = a.y + Math.random() * (a.height - size);
  const spd = 13 * Math.max(curScale, 0.6); // 提速版：240px 身材每蹦跳周期 13px
  stepTimer = setInterval(() => {
    const dx = walkTX + size / 2 - winCX, dy = walkTY + size / 2 - winCY;
    const d = Math.hypot(dx, dy);
    if (d < spd * 1.5) { toIdle(); return; } // 到目的地了
    vx = dx / d * spd; vy = dy / d * spd;
    petAPI.step({ dx: vx / 6, dy: vy / 6 });
  }, 70); // 一个蹦跳周期(.42s)拆 6 小步
  walkStopTimer = setTimeout(() => toIdle(), 6000 + Math.random() * 6000);
}

petAPI.onStepDone(({ flipX, flipY }) => {
  if (flipX) vx = -vx;
  if (flipY) vy = -vy;
});

function startSleep() {
  clearTimers();
  state = 'sleep';
  squash.classList.remove('hop');
  squash.classList.add('breathe');
  orb.classList.add('sleeping');
  setExpr('sleepy');
  sleepTimer = setTimeout(() => wake(false), 8000 + Math.random() * 6000); // 小睡 8-14 秒
}

function wake(angry) {
  if (state !== 'sleep') return;
  orb.classList.remove('sleeping');
  toIdle();
  if (angry) {
    setExpr('angry');
    say('……干嘛啦', 1200);
    setTimeout(() => { if (orb.dataset.expr === 'angry') refreshFace(); }, 1500);
  } else {
    // 自然睡醒：开心一下再恢复
    setExpr('happy');
    squash.classList.add('wobble');
    setTimeout(() => squash.classList.remove('wobble'), 720);
    setTimeout(() => { if (orb.dataset.expr === 'happy') refreshFace(); }, 1600);
  }
}

/* ---------- 超强提醒：permission/ask 超时没人理，闪现到光标旁上蹿下跳 ---------- */
let reminding = false;
petAPI.onSuperRemind(on => {
  reminding = on;
  if (on) {
    if (state === 'sleep') wake(false);
    orb.classList.remove('sleeping');
    squash.classList.remove('breathe');
    squash.classList.add('hop'); // 上蹿下跳
    say('理理我！', 1600);
  } else {
    squash.classList.remove('hop');
    squash.classList.add('breathe');
    refreshFace();
  }
});

/* ---------- 戳 & 拖拽 ---------- */
const pokeTexts = ['啵！', '呜', '别戳啦', '？', '再戳要漏气了', '嗷呜'];
let poking = false;
function poke() {
  if (poking) return;
  if (state === 'sleep') { wake(true); return; }
  if (state !== 'idle') return;
  poking = true;
  squash.classList.remove('poked');
  void squash.offsetWidth;
  squash.classList.add('poked');
  // 40% 冒爱心眼（气泡带 💙），35% 吓得瞪眼（互斥）；竞态防护：复位时若表情已被别的状态改掉，不再覆盖
  const r = Math.random();
  const love = r < .4;
  say(pokeTexts[Math.floor(Math.random() * pokeTexts.length)] + (love ? ' 💙' : ''), 750);
  if (love) {
    setExpr('love');
    setTimeout(() => { if (orb.dataset.expr === 'love') refreshFace(); }, 800);
  } else if (r < .75) {
    setExpr('shock');
    setTimeout(() => { if (orb.dataset.expr === 'shock') refreshFace(); }, 650);
  }
  setTimeout(() => { squash.classList.remove('poked'); poking = false; }, 520);
}

let pressing = false, dragging = false;
let pressX = 0, pressY = 0;
let lastX = 0, lastY = 0, lastT = 0;
let dragStartT = 0;

orb.addEventListener('pointerdown', e => {
  if (e.button !== 0) return; // 只响应左键：右键只开菜单，不能戳（否则 35% 触发圆形震惊眼）
  pressing = true; dragging = false;
  // 注意：必须用 screenX（屏幕绝对坐标）。clientX 是相对窗口的，
  // 窗口跟着鼠标一动，clientX 就被自己的移动抵消，形成反馈（实测拖到一半速）
  pressX = e.screenX; pressY = e.screenY;
  lastX = e.clientX; lastY = e.clientY; lastT = performance.now();
  petAPI.dragStart();
});

window.addEventListener('pointermove', e => {
  if (!pressing) return;
  if (!dragging && Math.hypot(e.screenX - pressX, e.screenY - pressY) > 5) {
    dragging = true;
    dragStartT = performance.now();
    clearTimers();
    state = 'drag';
    orb.classList.remove('sleeping');
    squash.classList.remove('hop');
    squash.style.transition = 'transform .08s';
    setExpr('shock');
  }
  if (dragging) {
    // 拎着超过 3 秒不放：从震惊变流汗
    if (performance.now() - dragStartT > 3000 && orb.dataset.expr === 'shock') setExpr('sweat');
    petAPI.dragTo({ dx: e.screenX - pressX, dy: e.screenY - pressY });
    const now = performance.now();
    const dt = Math.max(now - lastT, 1);
    const sp = Math.hypot(e.clientX - lastX, e.clientY - lastY) / dt * 16;
    const s = Math.min(sp / 30, .3);
    squash.style.transform = `scale(${1 + s}, ${1 - s * .7})`;
    lastX = e.clientX; lastY = e.clientY; lastT = now;
  }
});

window.addEventListener('pointerup', onPointerEnd);
// 指针被系统/菜单打断（pointercancel）时走同一套清理，防止 pressing/dragging 卡死
window.addEventListener('pointercancel', onPointerEnd);

function onPointerEnd() {
  if (!pressing) return;
  pressing = false;
  if (dragging) {
    dragging = false;
    squash.style.transition = '';
    squash.style.transform = '';
    squash.classList.add('wobble');
    setTimeout(() => squash.classList.remove('wobble'), 720);
    toIdle(); // 先回 idle，refreshFace 才不会被 drag 守卫拦住
    // 松手落地：20% 概率晕一下
    if (Math.random() < .2) {
      setExpr('dizzy');
      setTimeout(() => { if (orb.dataset.expr === 'dizzy') refreshFace(); }, 900);
    } else {
      refreshFace();
    }
  } else {
    poke();
  }
}

/* ---------- 说话 ---------- */
const talkTexts = [
  '你好呀，我是 Kimi',
  '今天也要加油哦',
  '写代码别忘了喝水',
  '我可不是官方的，但我超可爱',
  '别卷了，起来走两步',
  '早点睡，失眠星人'
];
let talking = false;
function talk() {
  if (talking || state === 'sleep' || state === 'drag') return;
  talking = true;
  orb.classList.add('talking');
  say(talkTexts[Math.floor(Math.random() * talkTexts.length)], 2200);
  setTimeout(() => { orb.classList.remove('talking'); talking = false; }, 2200);
}
petAPI.onTalk(talk);
petAPI.onToast(p => { // 主进程通报（装 Ghostty 进度等）；clear 收掉常驻气泡
  if (p.clear) { bubble.classList.remove('show', 'clickable'); return; }
  p.sticky ? saySticky(p.text) : say(p.text, 3000);
});
orb.addEventListener('dblclick', () => openKimiTerm()); // 双击开 Kimi Code 终端（说话走右键菜单）
// 独立函数：测试时替换它来拦截双击（contextBridge 暴露的对象是冻结的，stub 不了）
function openKimiTerm() { petAPI.openTerminal(); }

/* ---------- 滚轮调节大小 ---------- */
orb.addEventListener('wheel', e => {
  e.preventDefault();
  petAPI.resize({ dy: e.deltaY, ax: e.clientX, ay: e.clientY, vw: window.innerWidth, vh: window.innerHeight });
}, { passive: false });

/* ---------- 眼睛看向鼠标 ---------- */
// 主进程轮询屏幕光标坐标发过来：看向屏幕上任意处的鼠标，不只窗口内
// 偏移量最多 5 CSS px（随 zoom 等比放大，眼球越大动得越多，自然）
function eyeTrack() { return squash.querySelector('.eye-track'); }
petAPI.onCursor(({ x, y, wx, wy, area }) => {
  winCX = wx; winCY = wy; winArea = area; // 游走定位顺带更新
  if (pressing || state === 'sleep') return;
  const dx = x - wx, dy = y - wy;
  const d = Math.hypot(dx, dy) || 1;
  const reach = 240 * curScale; // 一个窗口宽度的屏幕距离作为"满偏"参考
  const t = Math.min(d / (reach / 2), 1) * 5;
  eyeTrack().style.transform = `translate(${dx / d * t}px, ${dy / d * t}px)`;
});

/* ---------- 右键菜单：睡觉 / 叫醒 ---------- */
petAPI.onToggleSleep(() => {
  if (state === 'sleep') wake(false);
  else startSleep();
});

/* ---------- 眨眼 ---------- */
(function blinkLoop() {
  setTimeout(() => {
    const e = orb.dataset.expr;
    if (['default', 'sweat', 'love'].includes(e) && state !== 'drag' && !orb.classList.contains('talking')) {
      orb.classList.add('blink');
      setTimeout(() => orb.classList.remove('blink'), 170);
    }
    blinkLoop();
  }, 2600 + Math.random() * 3200);
})();

/* ---------- 启动 ---------- */
toIdle();
</script>
</body>
</html>
