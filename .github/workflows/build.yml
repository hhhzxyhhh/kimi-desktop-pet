# 双平台构建：push 后在云端产出 macOS dmg 和 Windows 便携 exe
# 产物在 Actions 运行页的 Artifacts 里下载
name: build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: 打包
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "macos-latest" ]; then
            npx electron-builder --mac --publish never
          else
            npx electron-builder --win --publish never
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: kimi-desktop-pet-${{ matrix.os }}
          path: dist/*
          if-no-files-found: error
