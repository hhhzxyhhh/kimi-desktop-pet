# 双平台构建：push 后在云端产出 macOS dmg 和 Windows 便携 exe
# 产物在 Actions 运行页的 Artifacts 里下载
name: build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - name: 单元测试（纯 Node，Windows runner 上即真 Windows 环境）
        run: npm test
      - name: CDP 行为回归（带窗口跑，macOS/Windows 真 GUI）
        shell: bash
        run: |
          export KIMI_PET_ALLOW_MULTI=1 KIMI_PET_REMIND_MIN=1
          export KIMI_PET_STATE_DIR="$(node -e 'console.log(require("os").tmpdir() + "/pet-test-agent-state")')"
          node_modules/.bin/electron . --remote-debugging-port=9223 &
          EPID=$!
          sleep 5
          node test-cdp.mjs
          RC=$?
          kill $EPID 2>/dev/null || true
          exit $RC
      - name: 打包
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "macos-latest" ]; then
            npx electron-builder --mac --publish never
          else
            npx electron-builder --win --publish never
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: kimi-desktop-pet-${{ matrix.os }}
          path: dist/*
          if-no-files-found: error
